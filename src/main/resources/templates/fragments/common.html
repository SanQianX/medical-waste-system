<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle + ' - 医院废料管理系统'}">医院废料管理系统</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <th:block th:replace="${additionalHead}" />
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="app-header" th:fragment="header">
        <div class="header-left">
            <div class="logo">
                <span class="logo-icon">🏥</span>
                <span class="logo-text">医院废料管理系统</span>
            </div>
        </div>
        <div class="header-center">
            <div class="breadcrumb">
                <span th:text="${pageTitle}">页面标题</span>
            </div>
        </div>
        <div class="header-right">
            <div class="user-info">
                <span class="user-avatar">👤</span>
                <span class="user-name">管理员</span>
            </div>
            <a href="/logout" class="btn-logout">退出</a>
        </div>
    </header>

    <!-- 侧边栏 -->
    <aside class="app-sidebar" th:fragment="sidebar">
        <nav class="sidebar-nav">
            <!-- 概览 -->
            <div class="nav-group">
                <div class="nav-group-title">概览</div>
                <a th:href="@{/page/dashboard}" class="nav-item" th:classappend="${activeMenu == 'dashboard'} ? 'active'">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">首页仪表盘</span>
                </a>
            </div>

            <!-- 基础数据 -->
            <div class="nav-group">
                <div class="nav-group-title">基础数据</div>
                <a th:href="@{/page/department}" class="nav-item" th:classappend="${activeMenu == 'department'} ? 'active'">
                    <span class="nav-icon">🏥</span>
                    <span class="nav-text">科室管理</span>
                </a>
                <a th:href="@{/page/waste-category}" class="nav-item" th:classappend="${activeMenu == 'waste-category'} ? 'active'">
                    <span class="nav-icon">🗑️</span>
                    <span class="nav-text">废物类别管理</span>
                </a>
                <a th:href="@{/page/warehouse}" class="nav-item" th:classappend="${activeMenu == 'warehouse'} ? 'active'">
                    <span class="nav-icon">🏭</span>
                    <span class="nav-text">仓库管理</span>
                </a>
                <a th:href="@{/page/container}" class="nav-item" th:classappend="${activeMenu == 'container'} ? 'active'">
                    <span class="nav-icon">📦</span>
                    <span class="nav-text">容器管理</span>
                </a>
                <a th:href="@{/page/disposal-org}" class="nav-item" th:classappend="${activeMenu == 'disposal-org'} ? 'active'">
                    <span class="nav-icon">🏢</span>
                    <span class="nav-text">处置机构管理</span>
                </a>
                <a th:href="@{/page/user}" class="nav-item" th:classappend="${activeMenu == 'user'} ? 'active'">
                    <span class="nav-icon">👤</span>
                    <span class="nav-text">用户管理</span>
                </a>
            </div>

            <!-- 业务管理 -->
            <div class="nav-group">
                <div class="nav-group-title">业务管理</div>
                <a th:href="@{/page/waste-record}" class="nav-item" th:classappend="${activeMenu == 'waste-record'} ? 'active'">
                    <span class="nav-icon">📝</span>
                    <span class="nav-text">废物产生记录</span>
                </a>
                <a th:href="@{/page/transfer}" class="nav-item" th:classappend="${activeMenu == 'transfer'} ? 'active'">
                    <span class="nav-icon">🚚</span>
                    <span class="nav-text">转运管理</span>
                </a>
                <a th:href="@{/page/storage}" class="nav-item" th:classappend="${activeMenu == 'storage'} ? 'active'">
                    <span class="nav-icon">📦</span>
                    <span class="nav-text">贮存管理</span>
                </a>
                <a th:href="@{/page/disposal}" class="nav-item" th:classappend="${activeMenu == 'disposal'} ? 'active'">
                    <span class="nav-icon">🔥</span>
                    <span class="nav-text">处置管理</span>
                </a>
            </div>

            <!-- 系统管理 -->
            <div class="nav-group">
                <div class="nav-group-title">系统管理</div>
                <a th:href="@{/page/warning}" class="nav-item" th:classappend="${activeMenu == 'warning'} ? 'active'">
                    <span class="nav-icon">⚠️</span>
                    <span class="nav-text">预警管理</span>
                </a>
                <a th:href="@{/page/fee}" class="nav-item" th:classappend="${activeMenu == 'fee'} ? 'active'">
                    <span class="nav-icon">💰</span>
                    <span class="nav-text">费用管理</span>
                </a>
                <a th:href="@{/page/statistics}" class="nav-item" th:classappend="${activeMenu == 'statistics'} ? 'active'">
                    <span class="nav-icon">📈</span>
                    <span class="nav-text">数据统计</span>
                </a>
            </div>
        </nav>
    </aside>

    <!-- 面包屑导航 -->
    <div class="breadcrumb-nav" th:fragment="breadcrumb">
        <a th:href="@{/}">首页</a>
        <span class="separator">/</span>
        <span class="current" th:text="${pageTitle}">当前页面</span>
    </div>

    <!-- 分页组件 -->
    <div class="pagination" th:fragment="pagination(page, totalPages, url)">
        <a th:if="${page > 1}" th:href="@{${url}(page=${page - 1})}" class="page-btn">上一页</a>
        <span class="page-info">第 <span th:text="${page}">1</span> / <span th:text="${totalPages}">1</span> 页</span>
        <a th:if="${page < totalPages}" th:href="@{${url}(page=${page + 1})}" class="page-btn">下一页</a>
    </div>

    <!-- 统计卡片 -->
    <div class="stat-card" th:fragment="stat-card(label, value, color)">
        <div class="stat-label" th:text="${label}">标签</div>
        <div class="stat-value" th:class="${'stat-value-' + color}" th:text="${value}">0</div>
    </div>

    <!-- 空状态 -->
    <div class="empty-state" th:fragment="empty-state(message)">
        <div class="empty-icon">📭</div>
        <div class="empty-message" th:text="${message}">暂无数据</div>
    </div>

    <!-- 加载状态 -->
    <div class="loading-state" th:fragment="loading-state">
        <div class="loading-spinner"></div>
        <div class="loading-text">加载中...</div>
    </div>
</body>
</html>
