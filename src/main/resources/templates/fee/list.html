<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>费用管理 - 医院废物管理系统</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f6fa; }
        .header { background: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .header-title { font-size: 20px; font-weight: 600; color: #2c3e50; }
        .header-user { display: flex; align-items: center; gap: 15px; }
        .btn { padding: 8px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; text-decoration: none; display: inline-block; }
        .btn-primary { background: #3498db; color: white; }
        .btn-primary:hover { background: #2980b9; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .container { padding: 30px; max-width: 1400px; margin: 0 auto; }
        .section { background: white; border-radius: 10px; padding: 25px; margin-bottom: 20px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-bar { display: flex; gap: 10px; flex: 1; }
        .search-bar input, .search-bar select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 5px; }
        .table { width: 100%; border-collapse: collapse; }
        .table th { background: #f8f9fa; padding: 12px; text-align: left; font-weight: 600; color: #555; border-bottom: 2px solid #eee; }
        .table td { padding: 12px; border-bottom: 1px solid #eee; }
        .table tr:hover { background: #f8f9fa; }
        .status-tag { display: inline-block; padding: 4px 10px; border-radius: 3px; font-size: 12px; }
        .status-1 { background: #fff3cd; color: #856404; }
        .status-2 { background: #cce5ff; color: #004085; }
        .status-3 { background: #d4edda; color: #155724; }
        .action-btns { display: flex; gap: 5px; }
        .action-btns button { padding: 5px 10px; font-size: 12px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 500px; max-width: 90%; }
        .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 5px; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .stat-card .label { font-size: 14px; color: #999; margin-bottom: 5px; }
        .stat-card .value { font-size: 24px; font-weight: 700; color: #2c3e50; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">医院废物管理系统 - 费用管理</div>
        <div class="header-user">
            <a href="/page/dashboard" class="btn btn-primary">返回首页</a>
        </div>
    </div>

    <div class="container">
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">待结算</div>
                <div class="value" id="pendingCount">-</div>
            </div>
            <div class="stat-card">
                <div class="label">已结算</div>
                <div class="value" id="settledCount">-</div>
            </div>
            <div class="stat-card">
                <div class="label">已支付</div>
                <div class="value" id="paidCount">-</div>
            </div>
            <div class="stat-card">
                <div class="label">费用总额</div>
                <div class="value" id="totalAmount">-</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">费用记录列表</div>
            <div class="toolbar">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="搜索费用单号...">
                    <select id="statusFilter">
                        <option value="">全部状态</option>
                        <option value="1">待结算</option>
                        <option value="2">已结算</option>
                        <option value="3">已支付</option>
                    </select>
                    <button class="btn btn-primary" onclick="loadFees()">搜索</button>
                </div>
                <button class="btn btn-success" onclick="showAddModal()">+ 添加费用</button>
            </div>
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>费用单号</th>
                        <th>重量(kg)</th>
                        <th>单价(元/kg)</th>
                        <th>总金额(元)</th>
                        <th>费用类型</th>
                        <th>状态</th>
                        <th>结算日期</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="feeTable">
                    <tr><td colspan="9" style="text-align:center;">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 添加/编辑弹窗 -->
    <div class="modal" id="feeModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">添加费用记录</div>
            <form id="feeForm">
                <input type="hidden" id="feeId">
                <div class="form-group">
                    <label>费用单号 *</label>
                    <input type="text" id="feeNo" required>
                </div>
                <div class="form-group">
                    <label>重量(kg)</label>
                    <input type="number" id="weight" step="0.01">
                </div>
                <div class="form-group">
                    <label>单价(元/kg)</label>
                    <input type="number" id="unitPrice" step="0.0001">
                </div>
                <div class="form-group">
                    <label>总金额(元)</label>
                    <input type="number" id="totalAmountInput" step="0.01" readonly>
                </div>
                <div class="form-group">
                    <label>费用类型</label>
                    <select id="feeType">
                        <option value="处置费">处置费</option>
                        <option value="运输费">运输费</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>状态</label>
                    <select id="feeStatus">
                        <option value="1">待结算</option>
                        <option value="2">已结算</option>
                        <option value="3">已支付</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-primary" onclick="hideModal()">取消</button>
                    <button type="submit" class="btn btn-success">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const authHeaders = {
            'X-Token': localStorage.getItem('token') || '',
            'X-User-Id': localStorage.getItem('userId') || ''
        };

        async function loadFees() {
            try {
                const res = await fetch('/api/v1/fee/list', { headers: authHeaders });
                const data = await res.json();
                if (data.code === 200) {
                    renderTable(data.data);
                    updateStats(data.data);
                }
            } catch (e) {
                console.error('加载失败:', e);
            }
        }

        function updateStats(fees) {
            if (!fees || fees.length === 0) {
                document.getElementById('pendingCount').textContent = '0';
                document.getElementById('settledCount').textContent = '0';
                document.getElementById('paidCount').textContent = '0';
                document.getElementById('totalAmount').textContent = '0';
                return;
            }
            const pending = fees.filter(f => f.status === 1).length;
            const settled = fees.filter(f => f.status === 2).length;
            const paid = fees.filter(f => f.status === 3).length;
            const total = fees.reduce((sum, f) => sum + (f.totalAmount || 0), 0);
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('settledCount').textContent = settled;
            document.getElementById('paidCount').textContent = paid;
            document.getElementById('totalAmount').textContent = total.toFixed(2);
        }

        function renderTable(fees) {
            const tbody = document.getElementById('feeTable');
            if (!fees || fees.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;">暂无数据</td></tr>';
                return;
            }
            tbody.innerHTML = fees.map(f => `
                <tr>
                    <td>${f.id}</td>
                    <td>${f.feeNo}</td>
                    <td>${f.weight || '-'}</td>
                    <td>${f.unitPrice || '-'}</td>
                    <td>${f.totalAmount || '-'}</td>
                    <td>${f.feeType || '-'}</td>
                    <td><span class="status-tag status-${f.status || 1}">${getStatusText(f.status)}</span></td>
                    <td>${f.settlementDate ? f.settlementDate.substring(0,10) : '-'}</td>
                    <td class="action-btns">
                        <button class="btn btn-primary" onclick="editFee(${f.id})">编辑</button>
                        <button class="btn btn-danger" onclick="deleteFee(${f.id})">删除</button>
                    </td>
                </tr>
            `).join('');
        }

        function getStatusText(status) {
            const texts = {1: '待结算', 2: '已结算', 3: '已支付'};
            return texts[status] || '未知';
        }

        function showAddModal() {
            document.getElementById('modalTitle').textContent = '添加费用记录';
            document.getElementById('feeForm').reset();
            document.getElementById('feeId').value = '';
            document.getElementById('feeModal').classList.add('active');
        }

        function hideModal() {
            document.getElementById('feeModal').classList.remove('active');
        }

        async function editFee(id) {
            try {
                const res = await fetch(`/api/v1/fee/${id}`, { headers: authHeaders });
                const data = await res.json();
                if (data.code === 200) {
                    const f = data.data;
                    document.getElementById('modalTitle').textContent = '编辑费用记录';
                    document.getElementById('feeId').value = f.id;
                    document.getElementById('feeNo').value = f.feeNo;
                    document.getElementById('weight').value = f.weight || '';
                    document.getElementById('unitPrice').value = f.unitPrice || '';
                    document.getElementById('totalAmountInput').value = f.totalAmount || '';
                    document.getElementById('feeType').value = f.feeType || '处置费';
                    document.getElementById('feeStatus').value = f.status || 1;
                    document.getElementById('feeModal').classList.add('active');
                }
            } catch (e) {
                console.error('获取失败:', e);
            }
        }

        async function deleteFee(id) {
            if (!confirm('确定删除该费用记录?')) return;
            try {
                const res = await fetch(`/api/v1/fee/${id}`, {
                    method: 'DELETE',
                    headers: authHeaders
                });
                const data = await res.json();
                if (data.code === 200) {
                    alert('删除成功');
                    loadFees();
                } else {
                    alert('删除失败: ' + data.message);
                }
            } catch (e) {
                console.error('删除失败:', e);
            }
        }

        // 自动计算总金额
        document.getElementById('weight').addEventListener('input', calculateTotal);
        document.getElementById('unitPrice').addEventListener('input', calculateTotal);

        function calculateTotal() {
            const weight = parseFloat(document.getElementById('weight').value) || 0;
            const unitPrice = parseFloat(document.getElementById('unitPrice').value) || 0;
            document.getElementById('totalAmountInput').value = (weight * unitPrice).toFixed(2);
        }

        document.getElementById('feeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('feeId').value;
            const fee = {
                feeNo: document.getElementById('feeNo').value,
                weight: parseFloat(document.getElementById('weight').value) || 0,
                unitPrice: parseFloat(document.getElementById('unitPrice').value) || 0,
                totalAmount: parseFloat(document.getElementById('totalAmountInput').value) || 0,
                feeType: document.getElementById('feeType').value,
                status: parseInt(document.getElementById('feeStatus').value)
            };

            try {
                const url = id ? `/api/v1/fee/${id}` : '/api/v1/fee';
                const method = id ? 'PUT' : 'POST';
                const res = await fetch(url, {
                    method: method,
                    headers: { ...authHeaders, 'Content-Type': 'application/json' },
                    body: JSON.stringify(fee)
                });
                const data = await res.json();
                if (data.code === 200) {
                    alert('保存成功');
                    hideModal();
                    loadFees();
                } else {
                    alert('保存失败: ' + data.message);
                }
            } catch (e) {
                console.error('保存失败:', e);
            }
        });

        document.addEventListener('DOMContentLoaded', loadFees);
    </script>
</body>
</html>
