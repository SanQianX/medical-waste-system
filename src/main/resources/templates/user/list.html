<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="card">
        <div class="card-header">
            <h3 class="card-title">用户列表</h3>
            <button class="btn btn-primary" onclick="showAddModal()">新增用户</button>
        </div>

        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>用户名</th>
                    <th>真实姓名</th>
                    <th>所属科室</th>
                    <th>角色</th>
                    <th>手机号</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">新增用户</h3>
                <span class="modal-close" onclick="closeModal()">&times;</span>
            </div>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label class="form-label">用户名 *</label>
                    <input type="text" class="form-control" id="username" required>
                </div>
                <div class="form-group">
                    <label class="form-label" id="passwordLabel">密码 *</label>
                    <input type="password" class="form-control" id="password">
                </div>
                <div class="form-group">
                    <label class="form-label">真实姓名 *</label>
                    <input type="text" class="form-control" id="realName" required>
                </div>
                <div class="form-group">
                    <label class="form-label">所属科室</label>
                    <select class="form-control" id="departmentId">
                        <option value="">请选择</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">角色</label>
                    <select class="form-control" id="roleId">
                        <option value="1">管理员</option>
                        <option value="2">护士</option>
                        <option value="3">运送人员</option>
                        <option value="4">仓库管理员</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">手机号</label>
                    <input type="text" class="form-control" id="phone">
                </div>
                <div class="form-group">
                    <label class="form-label">状态</label>
                    <select class="form-control" id="status">
                        <option value="1">正常</option>
                        <option value="0">禁用</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentData = [];
        let departments = [];

        document.addEventListener('DOMContentLoaded', function() {
            loadDepartments();
            loadData();
        });

        async function loadDepartments() {
            try {
                const response = await fetch('/api/v1/department/list');
                const result = await response.json();
                if (result.code === 200) {
                    departments = result.data || [];
                    const select = document.getElementById('departmentId');
                    select.innerHTML = '<option value="">请选择</option>' +
                        departments.map(d => `<option value="${d.id}">${d.deptName}</option>`).join('');
                }
            } catch (error) {
                console.error('加载科室失败:', error);
            }
        }

        async function loadData() {
            try {
                const response = await fetch('/api/v1/user/list');
                const result = await response.json();
                if (result.code === 200) {
                    currentData = result.data || [];
                    renderTable(currentData);
                }
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }

        function getDeptName(deptId) {
            const dept = departments.find(d => d.id === deptId);
            return dept ? dept.deptName : '-';
        }

        function getRoleName(roleId) {
            const roles = {1: '管理员', 2: '护士', 3: '运送人员', 4: '仓库管理员'};
            return roles[roleId] || '未知';
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">暂无数据</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(item => `
                <tr>
                    <td>${item.id || ''}</td>
                    <td>${item.username || ''}</td>
                    <td>${item.realName || ''}</td>
                    <td>${getDeptName(item.departmentId)}</td>
                    <td>${getRoleName(item.roleId)}</td>
                    <td>${item.phone || ''}</td>
                    <td><span class="status-tag status-${item.status || 1}">${item.status === 1 ? '正常' : '禁用'}</span></td>
                    <td>
                        <button class="btn btn-warning" onclick="editItem(${item.id})">编辑</button>
                        <button class="btn btn-danger" onclick="deleteItem(${item.id})">删除</button>
                    </td>
                </tr>
            `).join('');
        }

        function showAddModal() {
            document.getElementById('modalTitle').innerText = '新增用户';
            document.getElementById('editForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('password').required = true;
            document.getElementById('passwordLabel').innerText = '密码 *';
            document.getElementById('editModal').classList.add('show');
        }

        async function editItem(id) {
            const item = currentData.find(d => d.id === id);
            if (!item) return;

            document.getElementById('modalTitle').innerText = '编辑用户';
            document.getElementById('editId').value = item.id;
            document.getElementById('username').value = item.username || '';
            document.getElementById('realName').value = item.realName || '';
            document.getElementById('departmentId').value = item.departmentId || '';
            document.getElementById('roleId').value = item.roleId || 1;
            document.getElementById('phone').value = item.phone || '';
            document.getElementById('status').value = item.status || 1;
            document.getElementById('password').required = false;
            document.getElementById('passwordLabel').innerText = '密码(留空不修改)';
            document.getElementById('editModal').classList.add('show');
        }

        async function deleteItem(id) {
            if (!confirm('确定要删除该用户吗？')) return;

            try {
                const response = await fetch(`/api/v1/user/${id}`, { method: 'DELETE' });
                const result = await response.json();
                if (result.code === 200) {
                    alert('删除成功');
                    loadData();
                } else {
                    alert(result.message || '删除失败');
                }
            } catch (error) {
                alert('删除失败');
            }
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('show');
        }

        document.getElementById('editForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const id = document.getElementById('editId').value;
            const data = {
                username: document.getElementById('username').value,
                realName: document.getElementById('realName').value,
                departmentId: document.getElementById('departmentId').value ? parseInt(document.getElementById('departmentId').value) : null,
                roleId: parseInt(document.getElementById('roleId').value),
                phone: document.getElementById('phone').value,
                status: parseInt(document.getElementById('status').value)
            };

            const password = document.getElementById('password').value;
            if (password) {
                data.password = password;
            }

            try {
                const method = id ? 'PUT' : 'POST';
                const url = id ? `/api/v1/user/${id}` : '/api/v1/user';
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (result.code === 200) {
                    alert('保存成功');
                    closeModal();
                    loadData();
                } else {
                    alert(result.message || '保存失败');
                }
            } catch (error) {
                alert('保存失败');
            }
        });
    </script>
</body>
</html>
