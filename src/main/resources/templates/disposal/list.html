<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>处置管理 - 医院废料管理系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="page-container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="logo">
                <h2>医院废料管理系统</h2>
            </div>

            <div class="menu-group">概览</div>
            <a href="/page/dashboard" class="menu-item">
                <span class="icon">📊</span> 首页仪表盘
            </a>

            <div class="menu-group">基础数据</div>
            <a href="/page/department" class="menu-item">
                <span class="icon">🏥</span> 科室管理
            </a>
            <a href="/page/waste-category" class="menu-item">
                <span class="icon">🗑️</span> 废物类别管理
            </a>
            <a href="/page/warehouse" class="menu-item">
                <span class="icon">🏭</span> 仓库管理
            </a>
            <a href="/page/disposal-org" class="menu-item">
                <span class="icon">🏢</span> 处置机构管理
            </a>

            <div class="menu-group">业务管理</div>
            <a href="/page/waste-record" class="menu-item">
                <span class="icon">📝</span> 废物产生记录
            </a>
            <a href="/page/transfer" class="menu-item">
                <span class="icon">🚚</span> 转运管理
            </a>
            <a href="/page/storage" class="menu-item">
                <span class="icon">📦</span> 贮存管理
            </a>
            <a href="/page/disposal" class="menu-item active">
                <span class="icon">🔥</span> 处置管理
            </a>
            <a href="/page/warning" class="menu-item">
                <span class="icon">⚠️</span> 预警管理
            </a>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <div class="header">
                <div class="header-title">处置管理</div>
                <div class="header-user">
                    <span>欢迎，管理员</span>
                    <a href="/" class="btn btn-primary btn-sm">退出</a>
                </div>
            </div>

            <div class="content">
    <div class="stats-grid">
        <div class="stat-card warning">
            <div class="label">待处置</div>
            <div class="value" id="stat-1">0</div>
        </div>
        <div class="stat-card success">
            <div class="label">已处置</div>
            <div class="value" id="stat-2">0</div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h3 class="card-title">处置记录列表</h3>
            <button class="btn btn-primary" onclick="showAddModal()">新建处置</button>
        </div>

        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>废物编码</th>
                    <th>处置机构</th>
                    <th>处置时间</th>
                    <th>处置重量</th>
                    <th>处置方式</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">新建处置</h3>
                <span class="modal-close" onclick="closeModal()">&times;</span>
            </div>
            <form id="editForm">
                <div class="form-group">
                    <label class="form-label">废物ID *</label>
                    <input type="number" class="form-control" id="wasteId" required>
                </div>
                <div class="form-group">
                    <label class="form-label">处置机构 *</label>
                    <select class="form-control" id="disposalOrgId" required>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">处置时间 *</label>
                    <input type="datetime-local" class="form-control" id="disposalTime" required>
                </div>
                <div class="form-group">
                    <label class="form-label">处置重量(kg)</label>
                    <input type="number" step="0.01" class="form-control" id="disposalWeight">
                </div>
                <div class="form-group">
                    <label class="form-label">处置方式</label>
                    <select class="form-control" id="disposalMethod">
                        <option value="焚烧">焚烧</option>
                        <option value="高温蒸汽">高温蒸汽</option>
                        <option value="化学消毒">化学消毒</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">备注</label>
                    <textarea class="form-control" id="remark" rows="2"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentData = [];
        let disposalOrgs = [];
        let wasteRecords = [];

        document.addEventListener('DOMContentLoaded', function() {
            loadOptions();
            loadData();
        });

        async function loadOptions() {
            try {
                const [orgRes, wasteRes] = await Promise.all([
                    fetch('/api/v1/disposal-org/list'),
                    fetch('/api/v1/waste/list')
                ]);
                const orgResult = await orgRes.json();
                const wasteResult = await wasteRes.json();

                disposalOrgs = orgResult.data || [];
                wasteRecords = wasteResult.data || [];

                document.getElementById('disposalOrgId').innerHTML = disposalOrgs.map(o =>
                    `<option value="${o.id}">${o.orgName}</option>`
                ).join('');
            } catch (error) {
                console.error('加载选项失败:', error);
            }
        }

        async function loadData() {
            try {
                const response = await fetch('/api/v1/disposal-record/list');
                const result = await response.json();
                if (result.code === 200) {
                    currentData = result.data || [];
                    updateStats();
                    renderTable(currentData);
                }
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }

        function updateStats() {
            const stats = {1: 0, 2: 0};
            currentData.forEach(item => {
                if (stats[item.status] !== undefined) stats[item.status]++;
            });
            document.getElementById('stat-1').innerText = stats[1];
            document.getElementById('stat-2').innerText = stats[2];
        }

        function getStatusText(status) {
            return status === 1 ? '待处置' : '已处置';
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">暂无数据</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(item => {
                const waste = wasteRecords.find(w => w.id === item.wasteId);
                const org = disposalOrgs.find(o => o.id === item.disposalOrgId);
                const disposalTime = item.disposalTime ? new Date(item.disposalTime).toLocaleString() : '';
                return `
                    <tr>
                        <td>${item.id || ''}</td>
                        <td>${waste ? waste.wasteCode : ''}</td>
                        <td>${org ? org.orgName : ''}</td>
                        <td>${disposalTime}</td>
                        <td>${item.disposalWeight || ''}</td>
                        <td>${item.disposalMethod || ''}</td>
                        <td><span class="status-tag status-${item.status}">${getStatusText(item.status)}</span></td>
                        <td>
                            ${item.status === 1 ? `<button class="btn btn-success" onclick="updateStatus(${item.id})">确认处置</button>` : ''}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function showAddModal() {
            document.getElementById('modalTitle').innerText = '新建处置';
            document.getElementById('editForm').reset();
            document.getElementById('disposalTime').value = new Date().toISOString().slice(0, 16);
            document.getElementById('editModal').classList.add('show');
        }

        async function updateStatus(id) {
            if (!confirm('确定已完成处置吗？')) return;

            try {
                const response = await fetch(`/api/v1/disposal-record/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: 2 })
                });
                const result = await response.json();
                if (result.code === 200) {
                    alert('状态更新成功');
                    loadData();
                } else {
                    alert(result.message || '更新失败');
                }
            } catch (error) {
                alert('更新失败');
            }
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('show');
        }

        document.getElementById('editForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const data = {
                wasteId: parseInt(document.getElementById('wasteId').value),
                disposalOrgId: parseInt(document.getElementById('disposalOrgId').value),
                disposalTime: document.getElementById('disposalTime').value,
                disposalWeight: parseFloat(document.getElementById('disposalWeight').value) || 0,
                disposalMethod: document.getElementById('disposalMethod').value,
                remark: document.getElementById('remark').value
            };

            try {
                const response = await fetch('/api/v1/disposal-record', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (result.code === 200) {
                    alert('保存成功');
                    closeModal();
                    loadData();
                } else {
                    alert(result.message || '保存失败');
                }
            } catch (error) {
                alert('保存失败');
            }
        });
    </script>
            </div>
        </div>
    </div>
</body>
</html>
