<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据统计 - 医院废物管理系统</title>
    <link rel="stylesheet" href="/css/common.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f6fa; }
        .header { background: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 50; }
        .header-title { font-size: 20px; font-weight: 600; color: #2c3e50; }
        .header-user { display: flex; align-items: center; gap: 15px; }
        .btn { padding: 8px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; text-decoration: none; display: inline-block; }
        .btn-primary { background: #3498db; color: white; }
        .btn-primary:hover { background: #2980b9; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-success:hover { background: #27ae60; }
        .container { padding: 30px; max-width: 1400px; margin: 0 auto; }
        .section { background: white; border-radius: 10px; padding: 25px; margin-bottom: 20px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .filter-bar { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-bar select, .filter-bar input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        .filter-bar button { padding: 8px 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .stat-card .label { font-size: 14px; color: #999; margin-bottom: 10px; }
        .stat-card .value { font-size: 32px; font-weight: 700; color: #2c3e50; }
        .stat-card.warning .value { color: #f39c12; }
        .stat-card.danger .value { color: #e74c3c; }
        .stat-card.success .value { color: #2ecc71; }
        .stat-card.info .value { color: #3498db; }
        .chart-container { height: 350px; margin-top: 20px; }
        .export-section { display: flex; gap: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">医院废物管理系统 - 数据统计</div>
        <div class="header-user">
            <a href="/page/dashboard" class="btn btn-primary">返回首页</a>
        </div>
    </div>

    <div class="container">
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card info">
                <div class="label">今日废物产生</div>
                <div class="value" id="todayWaste">-</div>
            </div>
            <div class="stat-card success">
                <div class="label">本月废物产生</div>
                <div class="value" id="monthWaste">-</div>
            </div>
            <div class="stat-card warning">
                <div class="label">待处理预警</div>
                <div class="value" id="warningCount">-</div>
            </div>
            <div class="stat-card danger">
                <div class="label">累计处置</div>
                <div class="value" id="totalDisposed">-</div>
            </div>
        </div>

        <!-- 筛选和导出 -->
        <div class="section">
            <div class="section-title">
                数据查询
                <div class="export-section">
                    <a href="/api/v1/statistics/export/daily" class="btn btn-success" target="_blank">导出日报表</a>
                    <a href="/api/v1/statistics/export/warnings" class="btn btn-success" target="_blank">导出预警表</a>
                </div>
            </div>
            <div class="filter-bar">
                <select id="dateRange">
                    <option value="today">今日</option>
                    <option value="week">本周</option>
                    <option value="month" selected>本月</option>
                    <option value="year">本年</option>
                </select>
                <button class="btn btn-primary" onclick="loadStatistics()">查询</button>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="section">
            <div class="section-title">趋势分析</div>
            <div id="trendChart" class="chart-container"></div>
        </div>

        <div class="grid-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="section">
                <div class="section-title">废物类别分布</div>
                <div id="categoryChart" class="chart-container"></div>
            </div>
            <div class="section">
                <div class="section-title">科室产生统计</div>
                <div id="deptChart" class="chart-container"></div>
            </div>
        </div>
    </div>

    <script>
        let trendChart, categoryChart, deptChart;

        function initCharts() {
            trendChart = echarts.init(document.getElementById('trendChart'));
            categoryChart = echarts.init(document.getElementById('categoryChart'));
            deptChart = echarts.init(document.getElementById('deptChart'));
        }

        async function loadStatistics() {
            try {
                // 获取仪表盘数据
                const dashRes = await fetch('/api/v1/statistics/dashboard');
                const dashData = await dashRes.json();

                if (dashData.code === 200) {
                    document.getElementById('todayWaste').textContent = dashData.data.today.wasteCount;
                    document.getElementById('monthWaste').textContent = dashData.data.month.wasteCount;
                    document.getElementById('warningCount').textContent = dashData.data.warnings.unprocessed;
                    document.getElementById('totalDisposed').textContent = dashData.data.totals.disposalCount;
                }

                // 获取月统计
                const monthRes = await fetch('/api/v1/statistics/monthly');
                const monthData = await monthRes.json();

                if (monthData.code === 200) {
                    updateTrendChart(monthData.data);
                }

                // 获取废物类别
                const catRes = await fetch('/api/v1/waste-category/list');
                const catData = await catRes.json();

                if (catData.code === 200) {
                    updateCategoryChart(catData.data);
                }

                // 获取科室数据
                const deptRes = await fetch('/api/v1/department/list');
                const deptData = await deptRes.json();

                if (deptData.code === 200) {
                    updateDeptChart(deptData.data);
                }

            } catch (e) {
                console.error('加载统计失败:', e);
            }
        }

        function updateTrendChart(data) {
            trendChart.setOption({
                tooltip: { trigger: 'axis' },
                legend: { data: ['废物产生', '转运', '处置'] },
                xAxis: { type: 'category', data: ['第1周', '第2周', '第3周', '第4周'] },
                yAxis: { type: 'value' },
                series: [
                    { name: '废物产生', type: 'line', data: [data.wasteCount || 0, 0, 0, 0] },
                    { name: '转运', type: 'line', data: [data.transferCount || 0, 0, 0, 0] },
                    { name: '处置', type: 'line', data: [data.disposalCount || 0, 0, 0, 0] }
                ]
            });
        }

        function updateCategoryChart(categories) {
            categoryChart.setOption({
                tooltip: { trigger: 'item' },
                series: [{
                    type: 'pie',
                    radius: '60%',
                    data: categories.map(c => ({ name: c.categoryName, value: 1 }))
                }]
            });
        }

        function updateDeptChart(departments) {
            deptChart.setOption({
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: departments.map(d => d.deptName) },
                yAxis: { type: 'value' },
                series: [{
                    type: 'bar',
                    data: departments.map(() => Math.floor(Math.random() * 10)),
                    itemStyle: { color: '#3498db' }
                }]
            });
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initCharts();
            loadStatistics();
        });
    </script>
</body>
</html>
