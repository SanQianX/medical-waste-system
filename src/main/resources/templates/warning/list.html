<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预警管理 - 医院废料管理系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="page-container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="logo">
                <h2>医院废料管理系统</h2>
            </div>

            <div class="menu-group">概览</div>
            <a href="/page/dashboard" class="menu-item">
                <span class="icon">📊</span> 首页仪表盘
            </a>

            <div class="menu-group">基础数据</div>
            <a href="/page/department" class="menu-item">
                <span class="icon">🏥</span> 科室管理
            </a>
            <a href="/page/waste-category" class="menu-item">
                <span class="icon">🗑️</span> 废物类别管理
            </a>
            <a href="/page/warehouse" class="menu-item">
                <span class="icon">🏭</span> 仓库管理
            </a>
            <a href="/page/disposal-org" class="menu-item">
                <span class="icon">🏢</span> 处置机构管理
            </a>
            <a href="/page/user" class="menu-item">
                <span class="icon">👤</span> 用户管理
            </a>

            <div class="menu-group">业务管理</div>
            <a href="/page/waste-record" class="menu-item">
                <span class="icon">📝</span> 废物产生记录
            </a>
            <a href="/page/transfer" class="menu-item">
                <span class="icon">🚚</span> 转运管理
            </a>
            <a href="/page/storage" class="menu-item">
                <span class="icon">📦</span> 贮存管理
            </a>
            <a href="/page/disposal" class="menu-item">
                <span class="icon">🔥</span> 处置管理
            </a>
            <a href="/page/warning" class="menu-item active">
                <span class="icon">⚠️</span> 预警管理
            </a>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <div class="header">
                <div class="header-title">预警管理</div>
                <div class="header-user">
                    <span>欢迎，管理员</span>
                    <a href="/" class="btn btn-primary btn-sm">退出</a>
                </div>
            </div>

            <div class="content">
    <div class="stats-grid">
        <div class="stat-card danger">
            <div class="label">高危预警</div>
            <div class="value" id="stat-high">0</div>
        </div>
        <div class="stat-card warning">
            <div class="label">中危预警</div>
            <div class="value" id="stat-medium">0</div>
        </div>
        <div class="stat-card info">
            <div class="label">低危预警</div>
            <div class="value" id="stat-low">0</div>
        </div>
        <div class="stat-card">
            <div class="label">未处理</div>
            <div class="value" id="stat-unprocessed">0</div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h3 class="card-title">预警列表</h3>
            <div>
                <button class="btn btn-primary" onclick="loadData()">刷新</button>
            </div>
        </div>

        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>预警类型</th>
                    <th>预警信息</th>
                    <th>预警级别</th>
                    <th>状态</th>
                    <th>创建时间</th>
                    <th>处理时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>

    <script>
        let currentData = [];

        document.addEventListener('DOMContentLoaded', function() {
            loadData();
        });

        async function loadData() {
            try {
                const response = await fetch('/api/v1/warning/list');
                const result = await response.json();
                if (result.code === 200) {
                    currentData = result.data || [];
                    updateStats();
                    renderTable(currentData);
                }
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }

        function updateStats() {
            const stats = {1: 0, 2: 0, 3: 0, unprocessed: 0};
            currentData.forEach(item => {
                if (item.warningLevel === 1) stats[1]++;
                if (item.warningLevel === 2) stats[2]++;
                if (item.warningLevel === 3) stats[3]++;
                if (item.status === 0) stats.unprocessed++;
            });
            document.getElementById('stat-high').innerText = stats[1];
            document.getElementById('stat-medium').innerText = stats[2];
            document.getElementById('stat-low').innerText = stats[3];
            document.getElementById('stat-unprocessed').innerText = stats.unprocessed;
        }

        function getWarningTypeText(type) {
            const texts = {'EXPIRE': '超时预警', 'OVERFLOW': '超量预警', 'EXCEPTION': '异常预警'};
            return texts[type] || type;
        }

        function getWarningLevelText(level) {
            const texts = {1: '高危', 2: '中危', 3: '低危'};
            return texts[level] || '未知';
        }

        function getStatusText(status) {
            return status === 0 ? '未处理' : '已处理';
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">暂无数据</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(item => `
                <tr>
                    <td>${item.id || ''}</td>
                    <td>${getWarningTypeText(item.warningType)}</td>
                    <td>${item.warningMsg || ''}</td>
                    <td><span class="status-tag status-${item.warningLevel}">${getWarningLevelText(item.warningLevel)}</span></td>
                    <td><span class="status-tag status-${item.status}">${getStatusText(item.status)}</span></td>
                    <td>${item.createTime ? item.createTime.substring(0, 16) : ''}</td>
                    <td>${item.handleTime ? item.handleTime.substring(0, 16) : '-'}</td>
                    <td>
                        ${item.status === 0 ? `<button class="btn btn-success" onclick="handleWarning(${item.id})">处理</button>` : ''}
                    </td>
                </tr>
            `).join('');
        }

        async function handleWarning(id) {
            if (!confirm('确定要处理这条预警吗？')) return;

            try {
                const response = await fetch(`/api/v1/warning/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: 1 })
                });
                const result = await response.json();
                if (result.code === 200) {
                    alert('处理成功');
                    loadData();
                } else {
                    alert(result.message || '处理失败');
                }
            } catch (error) {
                alert('处理失败');
            }
        }
    </script>
            </div>
        </div>
    </div>
</body>
</html>
