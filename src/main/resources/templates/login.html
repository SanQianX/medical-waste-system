<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 医院废料管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 450px;
        }
        .login-title {
            text-align: center;
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }
        .login-subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        /* 标签页样式 */
        .tabs {
            display: flex;
            border-bottom: 2px solid #eee;
            margin-bottom: 25px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-size: 16px;
            color: #666;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.3s;
        }
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: 600;
        }
        .tab:hover {
            color: #667eea;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
        }
        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .form-control:focus {
            outline: none;
            border-color: #667eea;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .message {
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 15px;
            display: none;
            font-size: 14px;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .links {
            text-align: center;
            margin-top: 20px;
        }
        .links a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1 class="login-title">医院废料管理系统</h1>
        <p class="login-subtitle">Medical Waste Management System</p>

        <div class="tabs">
            <div class="tab active" data-tab="login">账号登录</div>
            <div class="tab" data-tab="register">用户注册</div>
        </div>

        <div id="message" class="message"></div>

        <!-- 登录表单 -->
        <div class="tab-content active" id="login-content">
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-control" id="loginUsername" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-control" id="loginPassword" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn btn-primary">登录</button>
            </form>
        </div>

        <!-- 注册表单 -->
        <div class="tab-content" id="register-content">
            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label">用户名 *</label>
                    <input type="text" class="form-control" id="regUsername" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label class="form-label">密码 *</label>
                    <input type="password" class="form-control" id="regPassword" placeholder="请输入密码" required>
                </div>
                <div class="form-group">
                    <label class="form-label">真实姓名 *</label>
                    <input type="text" class="form-control" id="regRealName" placeholder="请输入真实姓名" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">手机号</label>
                        <input type="text" class="form-control" id="regPhone" placeholder="请输入手机号">
                    </div>
                    <div class="form-group">
                        <label class="form-label">邮箱</label>
                        <input type="email" class="form-control" id="regEmail" placeholder="请输入邮箱">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">注册</button>
            </form>
        </div>

        <div class="links">
            <a href="/page/dashboard">返回首页</a>
        </div>
    </div>

    <script>
        // 标签页切换逻辑
        const tabs = document.querySelectorAll('.tab');
        const tabContents = document.querySelectorAll('.tab-content');
        const messageEl = document.getElementById('message');

        // 检查URL参数，初始化标签页
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('tab') === 'register') {
            switchTab('register');
        }

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const tabName = tab.dataset.tab;
                switchTab(tabName);
            });
        });

        function switchTab(tabName) {
            tabs.forEach(t => t.classList.remove('active'));
            tabContents.forEach(c => c.classList.remove('active'));

            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
            document.getElementById(`${tabName}-content`).classList.add('active');

            // 清除消息
            messageEl.style.display = 'none';
            messageEl.className = 'message';
        }

        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
        }

        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (!response.ok) {
                    showMessage('登录失败：服务器错误', 'error');
                    return;
                }

                const result = await response.json();

                if (result.code === 200) {
                    // 保存登录信息到 localStorage
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('userId', result.user.id);
                    localStorage.setItem('user', JSON.stringify(result.user));
                    showMessage('登录成功，正在跳转...', 'success');

                    // 登录成功后直接跳转，不等待
                    // 在URL中传递token和userId，让后端Filter处理
                    window.location.href = '/page/dashboard';
                } else {
                    showMessage(result.message || '登录失败', 'error');
                }
            } catch (error) {
                showMessage('登录失败，请检查网络连接', 'error');
            }
        });

        // 注册表单提交
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const data = {
                username: document.getElementById('regUsername').value,
                password: document.getElementById('regPassword').value,
                realName: document.getElementById('regRealName').value,
                phone: document.getElementById('regPhone').value,
                email: document.getElementById('regEmail').value,
                roleId: 2 // 默认普通用户角色
            };

            try {
                const response = await fetch('/api/v1/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();

                if (result.code === 200) {
                    showMessage('注册成功，正在跳转到登录页...', 'success');
                    setTimeout(() => {
                        // 切换到登录标签
                        switchTab('login');
                        // 清空注册表单
                        document.getElementById('registerForm').reset();
                    }, 1500);
                } else {
                    showMessage(result.message || '注册失败', 'error');
                }
            } catch (error) {
                showMessage('注册失败，请稍后重试', 'error');
            }
        });
    </script>
</body>
</html>
