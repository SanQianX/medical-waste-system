<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>转运管理 - 医院废料管理系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="page-container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="logo">
                <h2>医院废料管理系统</h2>
            </div>

            <div class="menu-group">概览</div>
            <a href="/page/dashboard" class="menu-item">
                <span class="icon">📊</span> 首页仪表盘
            </a>

            <div class="menu-group">基础数据</div>
            <a href="/page/department" class="menu-item">
                <span class="icon">🏥</span> 科室管理
            </a>
            <a href="/page/waste-category" class="menu-item">
                <span class="icon">🗑️</span> 废物类别管理
            </a>
            <a href="/page/warehouse" class="menu-item">
                <span class="icon">🏭</span> 仓库管理
            </a>
            <a href="/page/disposal-org" class="menu-item">
                <span class="icon">🏢</span> 处置机构管理
            </a>

            <div class="menu-group">业务管理</div>
            <a href="/page/waste-record" class="menu-item">
                <span class="icon">📝</span> 废物产生记录
            </a>
            <a href="/page/transfer" class="menu-item active">
                <span class="icon">🚚</span> 转运管理
            </a>
            <a href="/page/storage" class="menu-item">
                <span class="icon">📦</span> 贮存管理
            </a>
            <a href="/page/disposal" class="menu-item">
                <span class="icon">🔥</span> 处置管理
            </a>
            <a href="/page/warning" class="menu-item">
                <span class="icon">⚠️</span> 预警管理
            </a>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <div class="header">
                <div class="header-title">转运管理</div>
                <div class="header-user">
                    <span>欢迎，管理员</span>
                    <a href="/" class="btn btn-primary btn-sm">退出</a>
                </div>
            </div>

            <div class="content">
    <div class="card">
        <div class="card-header">
            <h3 class="card-title">转运记录列表</h3>
            <button class="btn btn-primary" onclick="showAddModal()">新建转运</button>
        </div>

        <table class="table">
            <thead>
                <tr>
                    <th>转运单号</th>
                    <th>来源科室</th>
                    <th>目标仓库</th>
                    <th>运送人员</th>
                    <th>转运时间</th>
                    <th>接收时间</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">新建转运</h3>
                <span class="modal-close" onclick="closeModal()">&times;</span>
            </div>
            <form id="editForm">
                <div class="form-group">
                    <label class="form-label">废物ID列表 *</label>
                    <input type="text" class="form-control" id="wasteIds" placeholder="多个ID用逗号分隔" required>
                </div>
                <div class="form-group">
                    <label class="form-label">来源科室 *</label>
                    <select class="form-control" id="fromDepartmentId" required>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">目标仓库 *</label>
                    <select class="form-control" id="toWarehouseId" required>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">备注</label>
                    <textarea class="form-control" id="remark" rows="2"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentData = [];
        let departments = [];
        let warehouses = [];

        document.addEventListener('DOMContentLoaded', function() {
            loadOptions();
            loadData();
        });

        async function loadOptions() {
            try {
                const [deptRes, whRes] = await Promise.all([
                    fetch('/api/v1/department/list'),
                    fetch('/api/v1/warehouse/list')
                ]);
                const deptResult = await deptRes.json();
                const whResult = await whRes.json();

                departments = deptResult.data || [];
                warehouses = whResult.data || [];

                document.getElementById('fromDepartmentId').innerHTML = departments.map(d =>
                    `<option value="${d.id}">${d.deptName}</option>`
                ).join('');

                document.getElementById('toWarehouseId').innerHTML = warehouses.map(w =>
                    `<option value="${w.id}">${w.warehouseName}</option>`
                ).join('');
            } catch (error) {
                console.error('加载选项失败:', error);
            }
        }

        async function loadData() {
            try {
                const response = await fetch('/api/v1/transfer/list');
                const result = await response.json();
                if (result.code === 200) {
                    currentData = result.data || [];
                    renderTable(currentData);
                }
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }

        function getStatusText(status) {
            const map = {1: '待转运', 2: '运输中', 3: '已到达', 4: '已完成'};
            return map[status] || '未知';
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">暂无数据</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(item => {
                const fromDept = departments.find(d => d.id === item.fromDepartmentId);
                const toWh = warehouses.find(w => w.id === item.toWarehouseId);
                const transferTime = item.transferTime ? new Date(item.transferTime).toLocaleString() : '';
                const receiveTime = item.receiveTime ? new Date(item.receiveTime).toLocaleString() : '';
                return `
                    <tr>
                        <td>${item.transferNo || ''}</td>
                        <td>${fromDept ? fromDept.deptName : ''}</td>
                        <td>${toWh ? toWh.warehouseName : ''}</td>
                        <td>${item.transporterId || ''}</td>
                        <td>${transferTime}</td>
                        <td>${receiveTime}</td>
                        <td><span class="status-tag status-${item.status}">${getStatusText(item.status)}</span></td>
                        <td>
                            ${item.status < 4 ? `<button class="btn btn-success" onclick="updateStatus(${item.id}, ${item.status + 1})">${getStatusText(item.status + 1)}</button>` : ''}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function showAddModal() {
            document.getElementById('modalTitle').innerText = '新建转运';
            document.getElementById('editForm').reset();
            document.getElementById('editModal').classList.add('show');
        }

        async function updateStatus(id, newStatus) {
            if (!confirm(`确定要将状态更新为"${getStatusText(newStatus)}"吗？`)) return;

            try {
                const response = await fetch(`/api/v1/transfer/${id}/status/${newStatus}`, {
                    method: 'PUT'
                });
                const result = await response.json();
                if (result.code === 200) {
                    alert('状态更新成功');
                    loadData();
                } else {
                    alert(result.message || '更新失败');
                }
            } catch (error) {
                alert('更新失败');
            }
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('show');
        }

        document.getElementById('editForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const data = {
                wasteIds: document.getElementById('wasteIds').value,
                fromDepartmentId: parseInt(document.getElementById('fromDepartmentId').value),
                toWarehouseId: parseInt(document.getElementById('toWarehouseId').value),
                remark: document.getElementById('remark').value
            };

            try {
                const response = await fetch('/api/v1/transfer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (result.code === 200) {
                    alert('保存成功');
                    closeModal();
                    loadData();
                } else {
                    alert(result.message || '保存失败');
                }
            } catch (error) {
                alert('保存失败');
            }
        });
    </script>
            </div>
        </div>
    </div>
</body>
</html>
